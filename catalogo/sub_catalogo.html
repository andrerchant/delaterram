
<!doctype html>
<html lang="es-mx">
  <head>
    <meta charset="utf-8">  
    <title> Catálogo Cuautla </title>
    <meta name="viewport" content="width = device-width, minimum-scale=1, maximum-scale=1, user-scalable = no" />
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- External JS dependencies -->
    <script type="text/javascript" src="catalogo/assets/js/jquery-2.0.3.min.js"></script>
    <script type="text/javascript" src="catalogo/assets/js/underscore-min.js"></script>
    <script type="text/javascript" src="catalogo/assets/js/backbone-min.js"></script>
    
    <!-- Turn.js UI Kit -->
    <script type="text/javascript" src="catalogo/assets/js/turn.min.js"></script>
    
    <!-- App dependencies -->
    <script type="text/javascript" src="catalogo/assets/js/app.js"></script>
    <!-- <script type="text/javascript" src="catalogo/assets/js/peace.min.js"></script> -->


     <!-- External CSS dependencies -->
    <link type="text/css" rel="stylesheet" href="catalogo/assets/css/font-awesome.min.css"></link>
    <!-- <link rel="icon" type="image/png" href="catalogo/assets/img/favicon.png?a" /> -->
    <!-- <link href='http://fonts.googleapis.com/css?family=Carrois+Gothic+SC' rel='stylesheet' type='text/css'> -->

    <!-- App CSS dependencies -->
    <link type="text/css" rel="stylesheet" href="catalogo/assets/css/main.css"></link>

    <style type="text/css">
      .page-1 .s1{
        -webkit-transform: translateY(100px);
        -webkit-transition: all 1.5s;
        opacity: 0;
      }
      .page-1 .s2{
        -webkit-transform: translateY(100px);
        -webkit-transition: all 1s;
        -webkit-transition-delay: 0.5s;
        opacity: 0;
        font-family: 'Carrois Gothic SC', sans-serif;
        font-style: normal;
        font-weight: 400;
        font-size: 40px;
        text-align: center;
        color: white;
      }
    
      .page-1.animation-on .s1{
        -webkit-transform: translateY(0px);
        opacity: 1;
      }
      .page-1.animation-on .s2{
        -webkit-transform: translateY(0px);
        opacity: 1;
      }

    </style>
  </head>
<body>
  <div class="catalog-app">
  <div id="viewer">
    <div id="flipbook" class="ui-flipbook">
      
      <div>
        <article style="background:url(catalogo/pages/1-large.jpg)no-repeat;background-size:100% 100%;display:inline-block;width:100%; height:100%;">        
          <div style="text-align: center; height: 57%;  margin: auto;position: absolute; top: 0; left: 0; bottom: 0; right: 0;">
          <!-- <img src="catalogo/assets/img/turnjs-logo@2x.png" width="50" class="s1" /> -->
          <!-- <h1 class="s2">
            Catálogo <br /> Cuautla
          </h1> -->
          </div>
        </article>
      </div> 


      <a ignore="1" class="ui-arrow-control ui-arrow-next-page"></a>
      <a ignore="1" class="ui-arrow-control ui-arrow-previous-page"></a>
    </div>
  </div>


  <!-- controls -->
  <div id="controls">
        <form class="pagina" action="">
          <label for="page">Página</label>
          <input id="page" type="number" placeholder="0"></input>
        </form>
    <div class="all">
        <div class="ui-slider" id="page-slider">
        <div class="bar">
          <div class="progress-width">
            <div class="progress">
              <div class="handler"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="ui-options" id="options">
        <a class="ui-icon" id="ui-icon-table-contents">
          <i class="fa fa-bars"></i>
        </a>
        <!-- <a class="ui-icon show-hint" title="Miniatures" id="ui-icon-miniature">
          <i class="fa fa-th"></i>
        </a> -->
        <a class="ui-icon" id="ui-icon-zoom">
          <i class="fa fa-file-o"></i>
        </a>
        <!-- <a class="ui-icon show-hint" title="Share" id="ui-icon-share">
          <i class="fa fa-share"></i>
        </a> -->
        <a class="ui-icon show-hint" title="Pantalla Completa" id="ui-icon-full-screen">
          <i class="fa fa-expand"></i>
        </a>
        <a class="ui-icon show-hint" id="ui-icon-toggle">
          <i class="fa fa-ellipsis-h"></i>
        </a>
      </div>

      <!-- zoom slider -->
      <div id="zoom-slider-view" class="zoom-slider">
          <div class="bg">
             <div class="ui-slider" id="zoom-slider">
              <div class="bar">
                <div class="progress-width">
                  <div class="progress">
                    <div class="handler"></div>
                  </div>
                </div>
            </div>
          </div>
        </div>
      </div>
      <!-- / zoom slider -->
    </div>
    
    <div id="ui-icon-expand-options">
      <a class="ui-icon show-hint">
        <i class="fa fa-ellipsis-h"></i>
      </a>
    </div>

  </div>
  <!-- / controls -->

  <!-- miniatures -->
  <!-- <div id="miniatures" class="ui-miniatures-slider">
    
  </div> -->
  <!-- / miniatures -->

<script type="text/javascript">
  // Change these settings

    $('#page').focus(function(){
        // $(this).val("");
        $(this).select();
    });

    var NumPages=190;
    for (var i = 1; i < NumPages; i++) {

      if (i>1) {
        // $("#flipbook").append('<div><img src="pages/'+i+'.jpg"/ width="100%" height="100%"></div>');
        $("#flipbook").append('<div><article style="background:url(catalogo/pages/'+i+'-large.jpg)no-repeat;background-size:100% 100%;display:inline-block;width:100%; height:100%;"></article></div>');
        // image:url(\'pages/'+i+'.jpg\');backgr
      }

    }



  FlipbookSettings = {
    options: {
      width: 1280,
      height: 920
    },

    shareMessage: 'Introducing turn.js 5 - HTML5 Library for Flipbooks.',

    table: [
      {text: 'Portada', page: 1},
      {text: 'Presentación', page: 3},
      {text: 'Índice', page: 4},
      {text: 'Alimentos', page: 10},
      {text: 'Artesanías', page: 81},
      {text: 'Bebidas', page: 99},
      {text: 'Moda', page: 114  },
      {text: 'Salud y belleza', page: 145},
      {text: 'Varios', page: 168}
    ],

    pageFolder: 'content/catalog/'
  };

  function findValue(){
    var s=window.location.hash.split("/");
    $( "form.pagina input" ).val(s[1]);
  }

 $("form.pagina").on("submit",function(e){
  e.preventDefault();
  // var number=$("form.pagina input").val();
  document.location = "#page/" + $( "form.pagina input" ).val();
 });

  $(window).load(function(event) {
    $("#flipbook .page-1").addClass('animation-on');

    findValue();
  });

  $(window).on('hashchange', findValue);

  </script>
  
  </body>
</html>
